name: Apply Native Parity Tightening

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: github.event.head_commit.message != 'fix: complete native visual parity with web source'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Apply native parity patch
        run: |
          cat > /tmp/native-parity-tightening.patch <<'PATCH'
