          git apply --check /tmp/native-parity-tightening.patch
          git apply /tmp/native-parity-tightening.patch
      - name: Commit and push parity patch
        run: |
          if git diff --quiet; then
            echo "No native parity changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add SDRS-RN/src/auth/RnwAuthScreen.jsx SDRS-RN/src/components/layout/BottomTab.jsx SDRS-RN/src/components/layout/ScreenLayout.jsx SDRS-RN/src/features/manage/ManageShipEditPage.jsx
          git commit -m "fix: complete native visual parity with web source"
          git push origin HEAD:main
