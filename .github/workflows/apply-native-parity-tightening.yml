name: Apply Native Parity Tightening

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: github.event.head_commit.message != 'fix: complete native visual parity with web source'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Apply manage toast parity patch
        run: |
          cat > /tmp/manage-toast-parity.patch <<'PATCH'
diff --git a/SDRS-RN/src/features/manage/ManageShipEditPage.jsx b/SDRS-RN/src/features/manage/ManageShipEditPage.jsx
index 03d36ea..6a03b27 100644
--- a/SDRS-RN/src/features/manage/ManageShipEditPage.jsx
+++ b/SDRS-RN/src/features/manage/ManageShipEditPage.jsx
@@ -1495,7 +1495,7 @@ function ManageSavedToast({ message, onDismiss }) {
 
   const dragOpacity = 1 - dragOffset / maxVisibleDragOffset;
   const fadeOpacity = dragging ? dragOpacity : dismissing ? dismissOpacity : 1;
-  const toastBottom = Math.max(64 + bottomInset + 12, keyboardInset + 18);
+  const toastBottom = Math.max(52 + bottomInset, keyboardInset + 18);
 
   return (
     <View
PATCH
          git apply --check /tmp/manage-toast-parity.patch
          git apply /tmp/manage-toast-parity.patch
      - name: Commit and push manage toast parity patch
        run: |
          if git diff --quiet; then
            echo "No native parity changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add SDRS-RN/src/features/manage/ManageShipEditPage.jsx
          git commit -m "fix: complete native visual parity with web source"
          git push origin HEAD:main
