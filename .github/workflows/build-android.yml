name: Build Mobile Apps

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: SDRS-RN
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: SDRS-RN/package-lock.json
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Install dependencies
        run: npm install
      - name: Install EAS CLI
        run: npm install -g eas-cli
      - name: Build Android APK (local)
        run: eas build --platform android --profile preview --local --non-interactive --output ../sdrs-android.apk
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          ANDROID_HOME: /usr/local/lib/android/sdk
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: sdrs-android-apk
          path: sdrs-android.apk

  build-ios:
    name: Build iOS IPA
    runs-on: macos-latest
    defaults:
      run:
        working-directory: SDRS-RN
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: SDRS-RN/package-lock.json
      - name: Install dependencies
        run: npm install
      - name: Install EAS CLI
        run: npm install -g eas-cli
      - name: Build iOS IPA (local)
        run: eas build --platform ios --profile preview --local --non-interactive --output ../sdrs-ios.ipa
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: sdrs-ios-ipa
          path: sdrs-ios.ipa
