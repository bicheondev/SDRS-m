name: Apply Manage Toast Parity Patch
on:
  push:
    branches: [main]
    paths:
      - .github/workflows/apply-manage-toast-parity.yml
permissions:
  contents: write
concurrency:
  group: apply-manage-toast-parity
  cancel-in-progress: false
jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - name: Apply manage toast parity patch
        run: |
          set -euo pipefail
          path="SDRS-RN/src/features/manage/ManageShipEditPage.jsx"
          old="  const toastBottom = Math.max(64 + bottomInset + 12, keyboardInset + 18);"
          new="  const toastBottom = Math.max(52 + bottomInset, keyboardInset + 18);"
          if grep -Fq "$new" "$path"; then
            echo "Manage toast parity patch already applied."
            exit 0
          fi
          grep -F "$old" "$path"
          node <<'NODE'
          const fs = require('fs');
          const path = 'SDRS-RN/src/features/manage/ManageShipEditPage.jsx';
          const oldText = '  const toastBottom = Math.max(64 + bottomInset + 12, keyboardInset + 18);';
          const newText = '  const toastBottom = Math.max(52 + bottomInset, keyboardInset + 18);';
          const source = fs.readFileSync(path, 'utf8');
          if (!source.includes(oldText)) {
            throw new Error('Expected old manage toast bottom formula was not found.');
          }
          fs.writeFileSync(path, source.replace(oldText, newText));
          NODE
          grep -F "$new" "$path"
          git diff --check
          actual=$(git hash-object "$path")
          expected="6a03b2729f20e086e12708d9216990c2dd5981ec"
          if [ "$actual" != "$expected" ]; then
            echo "hash mismatch for $path: expected $expected got $actual" >&2
            exit 1
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$path"
          git commit -m "fix: complete native visual parity with web source"
          git push origin HEAD:main
